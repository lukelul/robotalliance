<!DOCTYPE html>
<html>
  <head>
    <script>
      var l = window.location;
      var path = l.pathname.slice('/robotalliance'.length) || '/';
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/robotalliance/?p=' + encodeURIComponent(path + l.search + l.hash));
    </script>
  </head>
</html>
